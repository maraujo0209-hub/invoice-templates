<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Database System</title>
    <style>
        :root {
            --primary-color: #111111;
            --secondary-color: #4a5568;
            --accent-bg: #f8fafc;
            --border-color: #cbd5e1;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            color: var(--primary-color);
            line-height: 1.5;
            margin: 0;
            padding: 0;
            background-color: #f1f5f9;
        }

        .db-container {
            background-color: #ffffff;
            width: 8.5in;
            margin: 40px auto;
            padding: 0.8in;
            box-sizing: border-box;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        @media print {
            @page { size: letter; margin: 0.5in; }
            body { background-color: #ffffff; }
            .db-container { margin: 0; padding: 0; width: 100%; box-shadow: none; }
        }

        header { border-bottom: 2px solid var(--primary-color); padding-bottom: 15px; margin-bottom: 30px; }
        h1 { font-size: 24px; font-weight: 800; text-transform: uppercase; margin: 0; }
        .subtitle { font-size: 12px; color: var(--secondary-color); text-transform: uppercase; letter-spacing: 2px; font-weight: 600; margin: 0; }

        table { width: 100%; border-collapse: collapse; }
        th { background-color: var(--primary-color); color: #ffffff; font-size: 11px; text-transform: uppercase; padding: 10px 12px; text-align: left; }
        td { padding: 10px 12px; font-size: 13px; border-bottom: 1px solid var(--border-color); }
        tr:nth-child(even) td { background-color: var(--accent-bg); }
    </style>
</head>
<body>

<div class="db-container">
    <header>
        <h1>Client Database System</h1>
        <p class="subtitle">Primary Master Corporate Directory</p>
    </header>

    <table>
        <thead>
            <tr>
                <th>Company Client</th>
                <th>Primary Contact</th>
                <th>Email Address</th>
                <th>Phone System</th>
                <th>Billing Method</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td><strong>Corporate Entity Systems</strong></td>
                <td>Patricia Araujo</td>
                <td>billing@entity.com</td>
                <td>+1 (555) 019-2831</td>
                <td>Net 30 Account</td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
