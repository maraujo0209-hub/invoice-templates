<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Directory - Tier 2 Pro</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="margin:0; padding:0; background-color:#f8fafc; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; color:#0f172a; line-height:1.5;">

  <header style="background-color:#ffffff; border-bottom:1px solid #e2e8f0; padding:0.75rem 1.5rem; position:sticky; top:0; z-index:100;">
    <div style="max-width:1100px; margin:0 auto; display:flex; justify-content:space-between; align-items:center;">
      <a href="index.html" style="font-size:1rem; font-weight:700; color:#7c3aed; text-decoration:none;"><i class="fa-solid fa-arrow-left"></i> Back to Hub</a>
      <span style="background:#f3e8ff; color:#6b21a8; font-size:0.75rem; font-weight:700; padding:0.25rem 0.5rem; border-radius:4px;">Tier 2 Pro Template</span>
    </div>
  </header>

  <main style="max-width:950px; margin:2rem auto; padding:0 1rem;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
      <h1 style="font-size:1.5rem; font-weight:700; margin:0;">Client Contact Directory</h1>
      <button type="button" onclick="window.print()" style="background:#7c3aed; color:#fff; border:none; padding:0.5rem 1rem; border-radius:6px; font-weight:600; cursor:pointer;"><i class="fa-solid fa-print"></i> Print / Save PDF</button>
    </div>

    <div style="background:#ffffff; border:1px solid #e2e8f0; border-radius:8px; padding:2.5rem; box-shadow:0 4px 6px -1px rgba(0,0,0,0.05);">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem; border-bottom:2px solid #e2e8f0; padding-bottom:1rem;">
        <div>
          <strong style="font-size:1.125rem; color:#0f172a; display:block;" contenteditable="true">Your Business Name</strong>
          <span style="font-size:0.875rem; color:#64748b;">Client Relationship Directory</span>
        </div>
        <span style="font-size:0.85rem; background-color:#f1f5f9; padding:0.3rem 0.6rem; border-radius:4px; font-weight:600; color:#475569;">Active Accounts</span>
      </div>

      <table style="width:100%; border-collapse:collapse; margin-bottom:1rem;">
        <thead>
          <tr style="background-color:#f1f5f9; border-bottom:2px solid #cbd5e1;">
            <th style="text-align:left; padding:0.75rem; font-size:0.85rem;">Client Name</th>
            <th style="text-align:left; padding:0.75rem; font-size:0.85rem;">Contact Person</th>
            <th style="text-align:left; padding:0.75rem; font-size:0.85rem;">Phone / Email</th>
            <th style="text-align:left; padding:0.75rem; font-size:0.85rem;">Service Address</th>
            <th style="text-align:center; padding:0.75rem; font-size:0.85rem; width:90px;">Status</th>
          </tr>
        </thead>
        <tbody>
          <tr style="border-bottom:1px solid #e2e8f0;">
            <td contenteditable="true" style="padding:0.75rem; font-size:0.85rem; font-weight:600;">Acme Corp</td>
            <td contenteditable="true" style="padding:0.75rem; font-size:0.85rem;">Alice Johnson</td>
            <td contenteditable="true" style="padding:0.75rem; font-size:0.85rem;">(555) 019-2831<br>alice@acme.com</td>
            <td contenteditable="true" style="padding:0.75rem; font-size:0.85rem;">100 Corporate Blvd, Suite 200</td>
            <td style="text-align:center; padding:0.75rem;"><span style="background:#dcfce7; color:#166534; font-size:0.75rem; font-weight:700; padding:0.2rem 0.5rem; border-radius:4px;">Active</span></td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>
</body>
</html>
