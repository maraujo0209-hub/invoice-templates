<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accounts Receivable Ledger</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="margin:0; padding:0; background-color:#f8fafc; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; color:#0f172a; line-height:1.5;">

  <!-- Global Nav -->
  <header style="background-color:#ffffff; border-bottom:1px solid #e2e8f0; padding:0.75rem 1.5rem; position:sticky; top:0; z-index:100;">
    <div style="max-width:1100px; margin:0 auto; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem;">
      <a href="index.html" style="font-size:1.125rem; font-weight:700; color:#2563eb; text-decoration:none; display:flex; align-items:center; gap:0.5rem;">
        <i class="fa-solid fa-chart-line"></i> Business Tracker
      </a>
      <nav style="display:flex; gap:0.5rem; flex-wrap:wrap;">
        <a href="index.html" style="color:#64748b; text-decoration:none; font-size:0.875rem;">Hub</a>
        <a href="invoice.html" style="color:#64748b; text-decoration:none; font-size:0.875rem;">Invoice</a>
        <a href="invoice_ledger.html" style="color:#2563eb; background:#eff6ff; text-decoration:none; font-size:0.875rem; font-weight:600; padding:0.3rem 0.6rem; border-radius:6px;">Ledger</a>
      </nav>
    </div>
  </header>

  <main style="max-width:1100px; margin:2rem auto; padding:0 1rem;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
      <div>
        <h1 style="font-size:1.5rem; font-weight:700; margin:0; color:#0f172a;">Accounts Receivable Ledger</h1>
        <p style="font-size:0.875rem; color:#64748b; margin:0.25rem 0 0 0;">Track client balances, invoice statuses, and due dates</p>
      </div>
      <button type="button" onclick="window.print()" style="background:#ffffff; color:#0f172a; border:1px solid #cbd5e1; padding:0.5rem 1rem; border-radius:6px; font-size:0.875rem; cursor:pointer;">
        <i class="fa-solid fa-print"></i> Export / Print
      </button>
    </div>

    <div style="background:#ffffff; border:1px solid #e2e8f0; border-radius:8px; padding:1.5rem; box-shadow:0 4px 6px -1px rgba(0,0,0,0.05);">
      <table style="width:100%; border-collapse:collapse; font-size:0.875rem;">
        <thead>
          <tr style="background:#f1f5f9; border-bottom:2px solid #cbd5e1; color:#334155; text-align:left;">
            <th style="padding:0.75rem;">Invoice #</th>
            <th style="padding:0.75rem;">Client Name</th>
            <th style="padding:0.75rem;">Date Issued</th>
            <th style="padding:0.75rem;">Due Date</th>
            <th style="padding:0.75rem; text-align:right;">Amount</th>
            <th style="padding:0.75rem; text-align:center;">Status</th>
          </tr>
        </thead>
        <tbody>
          <tr style="border-bottom:1px solid #e2e8f0;">
            <td style="padding:0.75rem; font-weight:600;" contenteditable="true">INV-1001</td>
            <td style="padding:0.75rem;" contenteditable="true">Acme Corp</td>
            <td style="padding:0.75rem;" contenteditable="true">2026-07-01</td>
            <td style="padding:0.75rem;" contenteditable="true">2026-07-15</td>
            <td style="padding:0.75rem; text-align:right;" contenteditable="true">$250.00</td>
            <td style="padding:0.75rem; text-align:center;"><span style="background:#dcfce7; color:#166534; padding:0.25rem 0.5rem; border-radius:4px; font-size:0.75rem; font-weight:600;">Paid</span></td>
          </tr>
          <tr style="border-bottom:1px solid #e2e8f0;">
            <td style="padding:0.75rem; font-weight:600;" contenteditable="true">INV-1002</td>
            <td style="padding:0.75rem;" contenteditable="true">Jane Smith</td>
            <td style="padding:0.75rem;" contenteditable="true">2026-07-10</td>
            <td style="padding:0.75rem;" contenteditable="true">2026-07-24</td>
            <td style="padding:0.75rem; text-align:right;" contenteditable="true">$180.00</td>
            <td style="padding:0.75rem; text-align:center;"><span style="background:#fef3c7; color:#92400e; padding:0.25rem 0.5rem; border-radius:4px; font-size:0.75rem; font-weight:600;">Pending</span></td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>
</body>
</html>
