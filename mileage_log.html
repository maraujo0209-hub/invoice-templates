<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mileage Calculation Log</title>
    <style>
        :root {
            --primary-color: #111111;
            --secondary-color: #4a5568;
            --accent-bg: #f8fafc;
            --border-color: #cbd5e1;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            color: var(--primary-color);
            line-height: 1.5;
            margin: 0;
            padding: 0;
            background-color: #f1f5f9;
        }

        .log-container {
            background-color: #ffffff;
            width: 8.5in;
            margin: 40px auto;
            padding: 0.8in;
            box-sizing: border-box;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        @media print {
            @page { size: letter; margin: 0.5in; }
            body { background-color: #ffffff; }
            .log-container { margin: 0; padding: 0; width: 100%; box-shadow: none; }
        }

        header { border-bottom: 2px solid var(--primary-color); padding-bottom: 15px; margin-bottom: 30px; }
        h1 { font-size: 24px; font-weight: 800; text-transform: uppercase; margin: 0; }
        .subtitle { font-size: 12px; color: var(--secondary-color); text-transform: uppercase; letter-spacing: 2px; font-weight: 600; margin: 0; }

        table { width: 100%; border-collapse: collapse; margin-bottom: 25px; }
        th { background-color: var(--primary-color); color: #ffffff; font-size: 11px; text-transform: uppercase; padding: 10px 12px; text-align: left; }
        td { padding: 10px 12px; font-size: 13px; border-bottom: 1px solid var(--border-color); }
        tr:nth-child(even) td { background-color: var(--accent-bg); }
        .num { text-align: right; }
        
        .rate-info { font-size: 12px; color: #64748b; margin-bottom: 15px; font-weight: 500; }
    </style>
</head>
<body>

<div class="log-container">
    <header>
        <h1>Mileage Calculation Log</h1>
        <p class="subtitle">Corporate Travel Reimbursement Log</p>
    </header>

    <div class="rate-info">Standard Deductible Mileage Rate Allowance Parameter: $0.00 / mile</div>

    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Destination Purpose & Travel Route</th>
                <th class="num">Odo Start</th>
                <th class="num">Odo End</th>
                <th class="num">Total Miles</th>
                <th class="num">Deduction</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>2026-07-10</td>
                <td>Corporate On-Site Integration Review Route</td>
                <td class="num">12,450</td>
                <td class="num">12,485</td>
                <td class="num">35</td>
                <td class="num">$0.00</td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
