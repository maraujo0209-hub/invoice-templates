<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asset Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #0f172a; --border: #cbd5e1; --bg-light: #f8fafc; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    body { background: #f8fafc; padding: 40px 20px; color: #334155; }
    .doc-card { max-width: 850px; margin: 0 auto; background: #fff; padding: 40px; border: 1px solid var(--border); border-radius: 6px; }
    .header { border-bottom: 2px solid var(--primary); padding-bottom: 16px; margin-bottom: 24px; display: flex; justify-content: space-between; }
    table { width: 100%; border-collapse: collapse; margin-bottom: 24px; font-size: 0.85rem; }
    th { background: var(--bg-light); text-align: left; padding: 10px; border-bottom: 2px solid var(--border); }
    td { padding: 10px; border-bottom: 1px solid #e2e8f0; }
    @media print { body { padding: 0; } .doc-card { border: none; } }
  </style>
</head>
<body>
  <div class="doc-card">
    <div class="header">
      <div>
        <h2 style="color: var(--primary);">Fixed Asset Register</h2>
        <p style="font-size: 0.85rem; color: #64748b;">[Company Name]</p>
      </div>
      <div style="text-align: right;">
        <p style="font-size: 0.85rem;"><strong>Fiscal Year:</strong> 2026</p>
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th>Asset Code</th>
          <th>Description</th>
          <th>Purchase Date</th>
          <th style="text-align: right;">Cost Basis</th>
          <th style="text-align: right;">Current Value</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>FA-001</td>
          <td>Office Workstations & Ergonomic Chairs</td>
          <td>Jan 15, 2025</td>
          <td style="text-align: right;">$4,500.00</td>
          <td style="text-align: right;">$3,200.00</td>
        </tr>
        <tr>
          <td>FA-002</td>
          <td>2024 Cargo Delivery Van</td>
          <td>Mar 10, 2024</td>
          <td style="text-align: right;">$32,000.00</td>
          <td style="text-align: right;">$22,500.00</td>
        </tr>
      </tbody>
    </table>
  </div>
</body>
</html>
