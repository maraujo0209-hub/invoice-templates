<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Feedback Form</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #0f172a; --border: #cbd5e1; --bg-light: #f8fafc; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    body { background: #f8fafc; padding: 40px 20px; color: #334155; }
    .doc-card { max-width: 800px; margin: 0 auto; background: #fff; padding: 40px; border: 1px solid var(--border); border-radius: 6px; }
    .header { border-bottom: 2px solid var(--primary); padding-bottom: 16px; margin-bottom: 24px; text-align: center; }
    .rating-group { margin-bottom: 20px; }
    .rating-title { font-size: 0.875rem; font-weight: 600; margin-bottom: 8px; color: var(--primary); }
    .stars { display: flex; gap: 8px; }
    .star-box { border: 1px solid var(--border); padding: 8px 16px; border-radius: 4px; font-size: 0.85rem; text-align: center; flex: 1; background: var(--bg-light); }
    .comment-box { border: 1px solid var(--border); border-radius: 4px; min-height: 100px; padding: 12px; margin-top: 8px; }
    @media print { body { padding: 0; } .doc-card { border: none; } }
  </style>
</head>
<body>
  <div class="doc-card">
    <div class="header">
      <h2 style="color: var(--primary);">Client Satisfaction Survey</h2>
      <p style="font-size: 0.85rem; color: #64748b;">Your feedback helps us continuously improve our service quality.</p>
    </div>

    <div class="rating-group">
      <div class="rating-title">1. Overall Quality of Service</div>
      <div class="stars">
        <div class="star-box">1 - Poor</div>
        <div class="star-box">2 - Fair</div>
        <div class="star-box">3 - Good</div>
        <div class="star-box">4 - Great</div>
        <div class="star-box">5 - Excellent</div>
      </div>
    </div>

    <div class="rating-group">
      <div class="rating-title">2. Professionalism & Communication</div>
      <div class="stars">
        <div class="star-box">1 - Poor</div>
        <div class="star-box">2 - Fair</div>
        <div class="star-box">3 - Good</div>
        <div class="star-box">4 - Great</div>
        <div class="star-box">5 - Excellent</div>
      </div>
    </div>

    <div class="rating-group">
      <div class="rating-title">3. Additional Comments or Suggestions</div>
      <div class="comment-box"></div>
    </div>
  </div>
</body>
</html>
