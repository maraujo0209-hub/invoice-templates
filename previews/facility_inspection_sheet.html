<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Facility Inspection Sheet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #0f172a; --border: #cbd5e1; --bg-light: #f8fafc; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    body { background: #f8fafc; padding: 40px 20px; color: #334155; }
    .doc-card { max-width: 800px; margin: 0 auto; background: #fff; padding: 40px; border: 1px solid var(--border); border-radius: 6px; }
    .header { border-bottom: 2px solid var(--primary); padding-bottom: 16px; margin-bottom: 24px; display: flex; justify-content: space-between; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; font-size: 0.875rem; }
    .box { border: 1px solid var(--border); padding: 10px; border-radius: 4px; background: var(--bg-light); }
    .box label { font-size: 0.75rem; font-weight: 700; color: #64748b; text-transform: uppercase; display: block; margin-bottom: 4px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th { background: var(--bg-light); text-align: left; padding: 8px; border-bottom: 2px solid var(--border); }
    td { padding: 8px; border-bottom: 1px solid #e2e8f0; }
    @media print { body { padding: 0; } .doc-card { border: none; } }
  </style>
</head>
<body>
  <div class="doc-card">
    <div class="header">
      <div>
        <h2 style="color: var(--primary);">Quality & Safety Inspection Sheet</h2>
        <p style="font-size: 0.85rem; color: #64748b;">Facility Audit Log</p>
      </div>
      <div style="text-align: right;">
        <p style="font-size: 0.85rem;"><strong>Inspection Date:</strong> July 22, 2026</p>
      </div>
    </div>

    <div class="grid">
      <div class="box"><label>Location / Client Facility</label>[Facility Name & Address]</div>
      <div class="box"><label>Inspector Name</label>[Inspector Name]</div>
    </div>

    <table>
      <thead>
        <tr>
          <th>Area / Criteria</th>
          <th style="width: 100px; text-align: center;">Pass / Fail</th>
          <th>Remarks / Deficiencies</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Restrooms sanitized and stocked</td>
          <td style="text-align: center;">PASS</td>
          <td>All dispensers full.</td>
        </tr>
        <tr>
          <td>Hard floors buffed and clean</td>
          <td style="text-align: center;">PASS</td>
          <td>No scuff marks remaining.</td>
        </tr>
      </tbody>
    </table>
  </div>
</body>
</html>
