<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Incident & Injury Report</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #0f172a; --border: #cbd5e1; --bg-light: #f8fafc; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    body { background: #f8fafc; padding: 40px 20px; color: #334155; }
    .doc-card { max-width: 800px; margin: 0 auto; background: #fff; padding: 40px; border: 1px solid var(--border); border-radius: 6px; }
    .header { border-bottom: 2px solid var(--primary); padding-bottom: 16px; margin-bottom: 24px; display: flex; justify-content: space-between; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .box { border: 1px solid var(--border); padding: 10px; border-radius: 4px; font-size: 0.875rem; background: var(--bg-light); }
    .box label { font-size: 0.75rem; font-weight: 700; color: #64748b; text-transform: uppercase; display: block; margin-bottom: 4px; }
    .full { grid-column: span 2; }
    @media print { body { padding: 0; } .doc-card { border: none; } }
  </style>
</head>
<body>
  <div class="doc-card">
    <div class="header">
      <div>
        <h2 style="color: var(--primary);">Workplace Incident & Injury Report</h2>
        <p style="font-size: 0.85rem; color: #64748b;">Safety & Operations Record</p>
      </div>
      <div style="text-align: right;">
        <p style="font-size: 0.85rem;"><strong>Report Date:</strong> July 22, 2026</p>
      </div>
    </div>

    <div class="grid">
      <div class="box"><label>Person Involved</label>[Full Name]</div>
      <div class="box"><label>Role / Job Title</label>[Employee / Contractor / Client]</div>
      <div class="box"><label>Date & Time of Incident</label>[MM/DD/YYYY @ 00:00 AM/PM]</div>
      <div class="box"><label>Location of Incident</label>[Site Address / Room]</div>
      <div class="box full"><label>Description of Event</label>[Detailed explanation of what occurred]</div>
      <div class="box full"><label>Injuries Sustained & First Aid Given</label>[Details of injuries and medical care provided]</div>
    </div>
  </div>
</body>
</html>
