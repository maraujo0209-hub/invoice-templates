<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Purchase Request Form</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #0f172a; --border: #cbd5e1; --bg-light: #f8fafc; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    body { background: #f8fafc; padding: 40px 20px; color: #334155; }
    .doc-card { max-width: 800px; margin: 0 auto; background: #fff; padding: 40px; border: 1px solid var(--border); border-radius: 6px; }
    .header { border-bottom: 2px solid var(--primary); padding-bottom: 16px; margin-bottom: 24px; display: flex; justify-content: space-between; }
    table { width: 100%; border-collapse: collapse; margin-bottom: 24px; font-size: 0.85rem; }
    th { background: var(--bg-light); text-align: left; padding: 10px; border-bottom: 2px solid var(--border); }
    td { padding: 10px; border-bottom: 1px solid #e2e8f0; }
    .sig-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; margin-top: 32px; }
    .sig-line { border-bottom: 1px solid #94a3b8; margin-top: 30px; }
    @media print { body { padding: 0; } .doc-card { border: none; } }
  </style>
</head>
<body>
  <div class="doc-card">
    <div class="header">
      <div>
        <h2 style="color: var(--primary);">Purchase Request Form</h2>
        <p style="font-size: 0.85rem; color: #64748b;">PR Ref #: PR-2026-019</p>
      </div>
      <div style="text-align: right;">
        <p style="font-size: 0.85rem;"><strong>Request Date:</strong> July 22, 2026</p>
      </div>
    </div>

    <div style="margin-bottom: 20px; font-size: 0.875rem;">
      <strong>Requested By:</strong> [Employee Name] | <strong>Department:</strong> [Operations]
    </div>

    <table>
      <thead>
        <tr>
          <th>Item / Description</th>
          <th style="width: 80px; text-align: center;">Qty</th>
          <th style="width: 120px; text-align: right;">Est. Unit Price</th>
          <th style="width: 120px; text-align: right;">Total Est.</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Bulk Cleaning Concentrates & Microfiber Towels</td>
          <td style="text-align: center;">5</td>
          <td style="text-align: right;">$60.00</td>
          <td style="text-align: right;">$300.00</td>
        </tr>
      </tbody>
    </table>

    <div class="sig-grid">
      <div>
        <div class="sig-line"></div>
        <p style="font-size: 0.8rem; color: #64748b; margin-top: 4px;">Requestor Signature</p>
      </div>
      <div>
        <div class="sig-line"></div>
        <p style="font-size: 0.8rem; color: #64748b; margin-top: 4px;">Manager Approval Signature</p>
      </div>
    </div>
  </div>
</body>
</html>
