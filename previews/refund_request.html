<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Refund Request Form</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #0f172a; --border: #cbd5e1; --bg-light: #f8fafc; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    body { background: #f8fafc; padding: 40px 20px; }
    .doc-card { max-width: 800px; margin: 0 auto; background: #fff; padding: 40px; border: 1px solid var(--border); border-radius: 6px; }
    .header { border-bottom: 2px solid var(--primary); padding-bottom: 16px; margin-bottom: 24px; display: flex; justify-content: space-between; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; color: #64748b; margin-bottom: 4px; }
    .input-box { width: 100%; border: 1px solid var(--border); padding: 10px; border-radius: 4px; font-size: 0.875rem; background: #fff; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .checkbox-group { margin: 16px 0; font-size: 0.875rem; }
    .checkbox-group label { margin-right: 16px; }
    @media print { body { padding: 0; } .doc-card { border: none; } }
  </style>
</head>
<body>
  <div class="doc-card">
    <div class="header">
      <div>
        <h2 style="color: var(--primary);">[Your Business Name]</h2>
        <p style="font-size: 0.85rem; color: #64748b;">Customer Support / Billing Department</p>
      </div>
      <div style="text-align: right;">
        <h2 style="color: var(--primary); text-transform: uppercase;">Refund Request</h2>
        <p style="font-size: 0.85rem; color: #64748b;">Date: July 22, 2026</p>
      </div>
    </div>

    <div class="grid">
      <div class="form-group">
        <label>Customer Name</label>
        <div class="input-box">[Customer Name]</div>
      </div>
      <div class="form-group">
        <label>Original Order / Invoice #</label>
        <div class="input-box">[INV-XXXXX]</div>
      </div>
    </div>

    <div class="grid">
      <div class="form-group">
        <label>Email Address</label>
        <div class="input-box">[customer@email.com]</div>
      </div>
      <div class="form-group">
        <label>Requested Refund Amount</label>
        <div class="input-box">$[0.00]</div>
      </div>
    </div>

    <div class="form-group">
      <label>Reason for Refund Request</label>
      <div class="checkbox-group">
        <label><input type="checkbox"> Defective Item</label>
        <label><input type="checkbox"> Service Not Rendered</label>
        <label><input type="checkbox"> Duplicate Charge</label>
        <label><input type="checkbox"> Other</label>
      </div>
    </div>

    <div class="form-group">
      <label>Detailed Explanation</label>
      <div class="input-box" style="height: 80px;">[Provide details regarding the reason for refund request...]</div>
    </div>

    <div style="margin-top: 32px; border-top: 1px dashed var(--border); padding-top: 20px;">
      <strong style="font-size: 0.85rem; text-transform: uppercase; color: #64748b;">Internal Admin Use Only</strong>
      <div class="grid" style="margin-top: 12px;">
        <div class="form-group">
          <label>Approved / Denied By</label>
          <div class="input-box">____________________</div>
        </div>
        <div class="form-group">
          <label>Date Processed</label>
          <div class="input-box">____ / ____ / 2026</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
