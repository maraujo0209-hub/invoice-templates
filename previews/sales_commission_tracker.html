<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sales Commission Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #0f172a; --border: #cbd5e1; --bg-light: #f8fafc; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    body { background: #f8fafc; padding: 40px 20px; color: #334155; }
    .doc-card { max-width: 850px; margin: 0 auto; background: #fff; padding: 40px; border: 1px solid var(--border); border-radius: 6px; }
    .header { border-bottom: 2px solid var(--primary); padding-bottom: 16px; margin-bottom: 24px; display: flex; justify-content: space-between; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th { background: var(--bg-light); text-align: left; padding: 8px; border-bottom: 2px solid var(--border); }
    td { padding: 8px; border-bottom: 1px solid #e2e8f0; }
    @media print { body { padding: 0; } .doc-card { border: none; } }
  </style>
</head>
<body>
  <div class="doc-card">
    <div class="header">
      <div>
        <h2 style="color: var(--primary);">Sales Commission Log</h2>
        <p style="font-size: 0.85rem; color: #64748b;">Monthly Representative Earnings</p>
      </div>
      <div style="text-align: right;">
        <p style="font-size: 0.85rem;"><strong>Rep:</strong> [Sales Rep Name]</p>
        <p style="font-size: 0.85rem; color: #64748b;"><strong>Period:</strong> July 2026</p>
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th style="width: 100px;">Deal Date</th>
          <th>Account / Client Name</th>
          <th style="width: 110px; text-align: right;">Contract Value</th>
          <th style="width: 90px; text-align: center;">Rate %</th>
          <th style="width: 110px; text-align: right;">Payout Due</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Jul 05, 2026</td>
          <td>Horizon Tech Office Hub</td>
          <td style="text-align: right;">$2,400.00</td>
          <td style="text-align: center;">10%</td>
          <td style="text-align: right;">$240.00</td>
        </tr>
      </tbody>
    </table>
  </div>
</body>
</html>
