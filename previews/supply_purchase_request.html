<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supply Purchase Request Form</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #0f172a; --border: #cbd5e1; --bg-light: #f8fafc; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    body { background: #f8fafc; padding: 40px 20px; color: #334155; }
    .doc-card { max-width: 800px; margin: 0 auto; background: #fff; padding: 40px; border: 1px solid var(--border); border-radius: 6px; }
    .header { border-bottom: 2px solid var(--primary); padding-bottom: 16px; margin-bottom: 24px; display: flex; justify-content: space-between; }
    .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; font-size: 0.875rem; }
    .box { border: 1px solid var(--border); padding: 10px; border-radius: 4px; background: var(--bg-light); }
    .box label { font-size: 0.75rem; font-weight: 700; color: #64748b; text-transform: uppercase; display: block; margin-bottom: 4px; }
    table { width: 100%; border-collapse: collapse; margin-top: 16px; font-size: 0.85rem; }
    th { background: var(--bg-light); text-align: left; padding: 8px; border-bottom: 2px solid var(--border); }
    td { padding: 8px; border-bottom: 1px solid #e2e8f0; }
    @media print { body { padding: 0; } .doc-card { border: none; } }
  </style>
</head>
<body>
  <div class="doc-card">
    <div class="header">
      <div>
        <h2 style="color: var(--primary);">Supply Purchase Requisition</h2>
        <p style="font-size: 0.85rem; color: #64748b;">Internal Procurement Request</p>
      </div>
      <div style="text-align: right;">
        <p style="font-size: 0.85rem;"><strong>Req ID:</strong> PR-2026-088</p>
      </div>
    </div>

    <div class="meta-grid">
      <div class="box"><label>Requested By</label>[Staff / Manager Name]</div>
      <div class="box"><label>Date Requested</label>July 22, 2026</div>
      <div class="box"><label>Preferred Vendor</label>[Supplier Name]</div>
      <div class="box"><label>Urgency Level</label>[ Standard / Urgent ]</div>
    </div>

    <table>
      <thead>
        <tr>
          <th>Item Code / Name</th>
          <th style="width: 80px; text-align: center;">Qty</th>
          <th style="width: 100px; text-align: right;">Est. Unit Price</th>
          <th style="width: 110px; text-align: right;">Total Price</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Heavy Duty Floor Cleaner (5 Gal)</td>
          <td style="text-align: center;">2</td>
          <td style="text-align: right;">$45.00</td>
          <td style="text-align: right;">$90.00</td>
        </tr>
        <tr>
          <td>Nitrile Gloves (Box of 100)</td>
          <td style="text-align: center;">5</td>
          <td style="text-align: right;">$12.00</td>
          <td style="text-align: right;">$60.00</td>
        </tr>
      </tbody>
    </table>
  </div>
</body>
</html>
