<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time Off Request Form</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #0f172a; --border: #cbd5e1; --bg-light: #f8fafc; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    body { background: #f8fafc; padding: 40px 20px; color: #334155; }
    .doc-card { max-width: 800px; margin: 0 auto; background: #fff; padding: 40px; border: 1px solid var(--border); border-radius: 6px; }
    .header { border-bottom: 2px solid var(--primary); padding-bottom: 16px; margin-bottom: 24px; display: flex; justify-content: space-between; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .box { border: 1px solid var(--border); padding: 10px; border-radius: 4px; font-size: 0.875rem; background: var(--bg-light); }
    .box label { font-size: 0.75rem; font-weight: 700; color: #64748b; text-transform: uppercase; display: block; margin-bottom: 4px; }
    @media print { body { padding: 0; } .doc-card { border: none; } }
  </style>
</head>
<body>
  <div class="doc-card">
    <div class="header">
      <div>
        <h2 style="color: var(--primary);">Paid Time Off (PTO) Request</h2>
        <p style="font-size: 0.85rem; color: #64748b;">Human Resources</p>
      </div>
      <div style="text-align: right;">
        <p style="font-size: 0.85rem;"><strong>Request Date:</strong> July 22, 2026</p>
      </div>
    </div>

    <div class="grid">
      <div class="box"><label>Employee Name</label>[Employee Name]</div>
      <div class="box"><label>Department</label>[Operations / Admin]</div>
    </div>

    <div class="grid">
      <div class="box"><label>Start Date</label>[MM/DD/YYYY]</div>
      <div class="box"><label>End Date</label>[MM/DD/YYYY]</div>
    </div>

    <div class="box" style="margin-bottom: 16px;">
      <label>Type of Leave</label>
      <div style="display: flex; gap: 16px; font-size: 0.85rem; margin-top: 4px;">
        <label><input type="checkbox"> Vacation</label>
        <label><input type="checkbox"> Sick Leave</label>
        <label><input type="checkbox"> Personal</label>
        <label><input type="checkbox"> Bereavement</label>
      </div>
    </div>

    <div style="margin-top: 30px; border-top: 1px dashed var(--border); padding-top: 16px;">
      <strong style="font-size: 0.8rem; text-transform: uppercase; color: #64748b;">Manager Approval</strong>
      <div class="grid" style="margin-top: 12px;">
        <div class="box"><label>Status</label>[ Approved / Denied ]</div>
        <div class="box"><label>Manager Signature & Date</label>______________________</div>
      </div>
    </div>
  </div>
</body>
</html>
