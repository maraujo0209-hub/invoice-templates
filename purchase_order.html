<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase Order - PO-0001</title>
    <style>
        :root {
            --primary-color: #111111;
            --secondary-color: #4a5568;
            --accent-bg: #f8fafc;
            --border-color: #cbd5e1;
        }

        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; color: var(--primary-color); margin: 0; padding: 0; background-color: #f1f5f9; }

        .invoice-container {
            background-color: #ffffff;
            width: 8.5in;
            min-height: 11in;
            margin: 40px auto;
            padding: 1in;
            box-sizing: border-box;
            position: relative;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        .invoice-container::after {
            content: "WATERMARKED PREVIEW - NOT FOR COMMERCIAL USE";
            position: absolute;
            top: 40%;
            left: 5%;
            right: 5%;
            font-size: 28px;
            font-weight: 900;
            color: rgba(220, 38, 38, 0.18);
            transform: rotate(-30deg);
            text-align: center;
            pointer-events: none;
            letter-spacing: 2px;
        }

        @media print { body { display: none !important; } }

        .invoice-header { display: flex; justify-content: space-between; margin-bottom: 40px; }
        .invoice-title-area h1 { font-size: 32px; font-weight: 700; margin: 0; text-transform: uppercase; }

        .items-table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }
        .items-table th { background-color: var(--primary-color); color: #ffffff; font-size: 11px; text-transform: uppercase; padding: 10px; text-align: left; }
        .items-table td { padding: 10px; font-size: 13px; border-bottom: 1px solid var(--border-color); }
        .items-table tr:nth-child(even) td { background-color: var(--accent-bg); }

        .invoice-footer { position: absolute; bottom: 1in; left: 1in; right: 1in; border-top: 1px solid var(--border-color); padding-top: 15px; display: flex; justify-content: space-between; font-size: 12px; color: var(--secondary-color); }
    </style>
</head>
<body>

<div class="invoice-container">
    <div class="invoice-header">
        <div>
            <h2>Your Business Name</h2>
            <p style="margin:0; font-size:13px;">123 Business Street</p>
        </div>
        <div class="invoice-title-area" style="text-align: right;">
            <h1>Purchase Order</h1>
            <p style="margin:0; font-weight:600;">PO Number: PO-2026-001</p>
        </div>
    </div>

    <table class="items-table">
        <thead>
            <tr>
                <th>Item Code</th>
                <th>Description</th>
                <th>Qty</th>
                <th style="text-align: right;">Unit Cost</th>
                <th style="text-align: right;">Total</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>SKU-102</td>
                <td>Raw Materials / Hardware Supply Order</td>
                <td>50</td>
                <td style="text-align: right;">$0.00</td>
                <td style="text-align: right;">$0.00</td>
            </tr>
        </tbody>
    </table>

    <div class="invoice-footer">
        <div>Authorized Buyer Signature: ___________________________</div>
        <div>Page 1 of 1</div>
    </div>
</div>

</body>
</html>
