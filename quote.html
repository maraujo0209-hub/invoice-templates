<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Official Price Quote</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="margin:0; padding:0; background-color:#f8fafc; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; color:#0f172a; line-height:1.5;">

  <header style="background-color:#ffffff; border-bottom:1px solid #e2e8f0; padding:0.75rem 1.5rem; position:sticky; top:0; z-index:100;">
    <div style="max-width:1100px; margin:0 auto; display:flex; justify-content:space-between; align-items:center;">
      <a href="index.html" style="font-size:0.875rem; font-weight:700; color:#0f172a; text-decoration:none;"><i class="fa-solid fa-arrow-left"></i> ← Back to All Templates</a>
      <span style="background:#0f172a; color:#fff; font-size:0.75rem; font-weight:700; padding:0.25rem 0.6rem; border-radius:4px; letter-spacing:0.05em;">PREVIEW ONLY</span>
    </div>
  </header>

  <main style="max-width:850px; margin:2rem auto; padding:0 1rem;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
      <h1 style="font-size:1.5rem; font-weight:700; margin:0;">Official Price Quote</h1>
      <button type="button" onclick="window.print()" style="background:#0f172a; color:#fff; border:none; padding:0.5rem 1rem; border-radius:6px; font-weight:600; cursor:pointer;"><i class="fa-solid fa-print"></i> Print / Save PDF</button>
    </div>

    <div style="background:#ffffff; border:1px solid #e2e8f0; border-radius:8px; padding:2.5rem; box-shadow:0 4px 6px -1px rgba(0,0,0,0.05);">
      <table style="width:100%; border-collapse:collapse; margin-bottom:2rem; border-bottom:2px solid #e2e8f0; padding-bottom:1.5rem;">
        <tr>
          <td style="vertical-align:top; width:60%;">
            <div style="width:160px; height:50px; border:2px dashed #cbd5e1; border-radius:6px; display:flex; align-items:center; justify-content:center; color:#64748b; font-size:0.85rem; background-color:#f8fafc; margin-bottom:1rem;">
              <i class="fa-solid fa-image" style="margin-right:0.5rem;"></i> Business Logo
            </div>
            <div style="font-size:0.875rem; color:#64748b;">
              <strong style="font-size:1.125rem; color:#0f172a; display:block;" contenteditable="true">Your Business Name</strong>
              <span contenteditable="true">123 Business Rd, City, ST 12345</span>
            </div>
          </td>
          <td style="vertical-align:top; text-align:right; width:40%;">
            <h1 style="font-size:1.75rem; font-weight:800; color:#0f172a; margin:0 0 0.5rem 0;">PRICE QUOTE</h1>
            <p style="font-size:0.875rem; color:#334155; margin:0 0 0.25rem 0;"><strong>Quote #:</strong> <span contenteditable="true">QT-3001</span></p>
            <p style="font-size:0.875rem; color:#334155; margin:0 0 0.25rem 0;"><strong>Quote Date:</strong> <span contenteditable="true">2026-07-21</span></p>
            <p style="font-size:0.875rem; color:#334155; margin:0;"><strong>Valid Until:</strong> <span contenteditable="true">2026-08-21</span></p>
          </td>
        </tr>
      </table>
    </div>
  </main>
</body>
</html>
